schema_version = 3

# Mic input + speaker output devices — regexes matched (case-insensitive)
# against PyAudio's enumerated device names. Tune to your hardware; if a
# regex doesn't match, the pipeline refuses to start and lists the
# available device names. Use `just list-devices` to see candidates and
# `just play-test-tone` to verify the speaker side end-to-end.
[audio]
# Match PipeWire's virtual input/output — PipeWire bridges to whichever
# physical device is set as the OS-level default (System Settings ->
# Sound -> Input/Output). Going through PipeWire gets us automatic
# resampling from the device's native rate (typically 44.1 kHz or
# 48 kHz) down to the 16 kHz the pipeline pins (Whisper / Porcupine /
# Cartesia all agree on this format end-to-end). Direct ALSA pinning
# (e.g. "BY Y02") fails for devices whose native rate isn't 16 kHz
# because PyAudio doesn't resample.
input_device_name = "^pipewire$"
# Output via PipeWire too — gives us the same 16 kHz <-> device-native
# rate resampling on the playback side. Direct ALSA pinning to the BY Y02
# fails with paInvalidSampleRate (PortAudio doesn't auto-resample on
# output any more than on input), so on this PC we stay on the PipeWire
# alias even though it follows whatever the OS default sink is set to.
# Bluetooth-resistance is deferred (Story 5.4 territory).
#
# v2 (Pi) note: on the Pi the BY Y02 conference unit will be the only
# audio device, so a direct-device regex like `^BY Y02` should work out
# of the box and is preferred for stable production routing. Re-test
# `just play-test-tone` during the v2 port; if it plays cleanly with
# the direct regex, ship that — no PipeWire dance needed on the Pi.
output_device_name = "^pipewire$"

# Picovoice Porcupine wake-word (Story 1.6). The .ppn file is trained at
# https://console.picovoice.ai/ for "Hey OLAF" and committed under
# models/wakeword/. Sensitivity 0.5 is conservative — Story 5.5 tunes.
[wakeword]
model_path = "models/wakeword/hey_olaf.ppn"
# Sensitivity 0.85 (above the architecture's conservative-default 0.5)
# because 0.5 produced false-negatives during Story 1.6's live test on the
# BY Y02 USB conference mic. Story 5.5 will calibrate the production value
# from a real ambient soak; 0.85 just lets us close 1.6's "mechanism works
# end-to-end" AC. If you swap in a different mic and see false-positives,
# drop this back toward 0.5.
sensitivity = 0.85

# Voice activity detection (Story 1.7). silence_duration_ms is how long we
# wait in continuous silence after the user stops speaking before we cut
# the utterance and run STT. Increase if folks pause a lot between words;
# decrease if you want faster turn-around.
[vad]
silence_duration_ms = 700
min_speech_duration_ms = 250
start_threshold = 0.5
end_threshold = 0.35

# Speech-to-text (Story 1.7, sprint-change-proposal-2026-05-12).
#
# v1 default backend: "groq" — cloud STT via Groq's openai-compatible
# audio/transcriptions endpoint. Requires GROQ_API_KEY in .env (the
# same key Talker uses when [talker] provider = "groq"). Whisper-large-
# v3-turbo at ~216x real-time on Groq's LPU comfortably clears NFR3's
# 500ms p95 end-of-speech → transcript budget. Cost is ~$0.04/hr of
# audio — pennies at hobby scale.
#
# To switch to the on-device backend, change one line:
#     backend = "whisper-cpu"
# The faster-whisper model + compute_type + device fields below kick in
# only on that path; the groq_model + api_key_env fields kick in only on
# the cloud path. Behind the same STTBackend Protocol — no other config
# edit needed for the swap.
#
# Why default flipped to cloud (full rationale in sprint-change-proposal-
# 2026-05-12.md): (a) on-device deployment via Pi 5 + Hailo regresses
# accuracy because Hailo's zoo caps at Whisper-Small with no accent
# fine-tune at that size; (b) Indian-accent recognition on the existing
# distil-whisper-small.en path was the original driver. Audio of every
# utterance leaves the device for the cloud backend — operators who
# weight privacy over accuracy flip the one line above.
[stt]
backend = "groq"
# Groq audio model. "whisper-large-v3-turbo" is the cheapest + fastest
# tier (~$0.04/hr); quality within ~1% of full whisper-large-v3 for
# English. Operators can swap to "whisper-large-v3" for slightly higher
# accuracy at ~3x cost, or any other Groq audio model.
groq_model = "whisper-large-v3-turbo"
# Env-var name for the Groq API key. Defaults to "GROQ_API_KEY" — the
# same key Talker reads when [talker] provider = "groq". Override only
# when separating STT/Talker keys for rate-limit or audit reasons.
api_key_env = "GROQ_API_KEY"
# faster-whisper knobs — consumed only when backend = "whisper-cpu".
# Kept committed so an operator can flip backend without re-hunting the
# right model/CT2-variant settings. Systran/faster-distil-whisper-small.en
# is the offline path's calibrated choice (Story 3.7); CT2-compiled
# distilled variant from the SYSTRAN HuggingFace org. ~6x faster than
# full large-v3 with WER within ~1%.
model = "Systran/faster-distil-whisper-small.en"
compute_type = "int8"
device = "auto"
low_confidence_threshold = 0.5
# Story 4.5 (2026-05-07 redesign): static-random pick from a list of
# clarification phrases. Story 3.7's `cdf3618` short-circuit emits
# the picked phrase verbatim as a TalkerResponseFrame (no LLM round-
# trip), so this list IS what the user hears — these are the spoken
# phrases, not instructions to an LLM.
#
# Tone: casual, friendly, Ooppi's voice — small, voice-first, a bit
# playful, sometimes apologetic. Avoid formal butler-speak ("Pardon?").
# Voice-natural beats grammatically clean ("uh, what?" beats "I beg
# your pardon"). Prefer short — most are 1-5 words.
#
# At runtime the TurnRouter picks one entry uniformly at random per
# low-confidence turn (random.choice). 40 entries gives ~2.5% chance
# of immediate-repeat — feels naturally varied. Operators can keep
# adding entries over time. Must be non-empty (validated at startup).
clarification_prompts = [
    "huh?",
    "wait, what?",
    "say that again?",
    "hm — one more time?",
    "oof, missed that",
    "sorry — what was that?",
    "didn't quite catch that",
    "come again?",
    "ah, say again?",
    "what was that, sorry?",
    "uh, repeat?",
    "hmm — once more?",
    "missed it, try again?",
    "didn't hear you",
    "sorry — one more?",
    "what? say again?",
    "oof — repeat that?",
    "hm, what was that?",
    "sorry, missed it",
    "didn't get that",
    "once more?",
    "say again?",
    "what was that?",
    "missed that — again?",
    "hm? what?",
    "what'd you say?",
    "lost that one",
    "missed you there",
    "say once more?",
    "didn't catch that",
    "ah, missed it",
    "uh sorry, what?",
    "wait — say again",
    "hmm, repeat?",
    "what was that, hm?",
    "didn't get it",
    "ah hm — say again?",
    "uh, missed that",
    "say it once more?",
    "what? one more time?",
]

# Talker (Story 2.2). Fast-path LLM for short conversational replies.
# Three providers wired out of the box — all reach the same `openai`
# SDK via their openai-compatible endpoints. To swap, change ONE LINE
# (`provider = "..."`) and restart. Each provider's matching API key
# must be present in `.env`:
#
#   provider = "openai"  -> needs OPENAI_API_KEY
#   provider = "groq"    -> needs GROQ_API_KEY  (v1 default since 2026-05-12)
#   provider = "gemini"  -> needs GEMINI_API_KEY
#
# 2026-05-12: operator-level swap from OpenAI to Groq. Measured TTFT on
# `gpt-5.4-nano` over a real session ranged 0.5-4.7s (median ~2s),
# blowing NFR1's 1500ms end-to-end budget. Groq + `openai/gpt-oss-120b`
# delivers ~0.4-0.7s TTFT via Groq's LPU, with comparable instruction-
# following / tool-call reliability. Same `openai` SDK — no code
# change, just this provider flip + the [talker.groq] model below.
#
# `max_tokens = 512` keeps replies to 1-2 sentences; raising it risks
# verbose answers that blow NFR1. Edit `prompts/talker_system.md` (not
# env vars) to change OLAF's voice / personality.
[talker]
provider = "groq"
max_tokens = 512
system_prompt_path = "prompts/talker_system.md"
# Story 4.1: belief-state grounding. List of keys to fetch from the
# orchestrator daemon at the start of each Talker turn (Story 4.4
# wires the call). Empty list ≡ no grounding (v1 default). Example:
#   grounded_keys = ["time", "calendar_today"]
grounded_keys = []

# Per-provider model identifiers. Only the active provider's sub-block
# is consumed; the others stay declared so swapping is a single edit
# above. To try a different model within a provider, edit the matching
# line below.
#
# OpenAI gpt-5.4-nano: cheapest GPT-5 tier, ~250-400 ms TTFB, reliable
# on structured output (matters for Epic 3 inline tags).
[talker.openai]
model = "gpt-5.4-nano"

# Groq + `openai/gpt-oss-120b`: OpenAI's open-weight GPT model
# (117B MoE, 5.1B active) hosted on Groq's LPU. ~0.4-0.7s TTFT,
# strong instruction-following and tool-call reliability, Apache-2.0
# license, $0.15/M input + $0.60/M output. This is the v1 Talker
# default since 2026-05-12.
#
# Alternative Groq models if you want to experiment:
#   "llama-3.3-70b-versatile"  -> ~0.3-0.4s TTFT, similar quality, less
#                                  reliable on inline SSML tag adherence
#   "qwen/qwen3-32b"           -> ~0.2-0.3s TTFT, cheaper, noticeably
#                                  weaker on tool-call JSON discipline
#   "llama-3.1-8b-instant"     -> ~0.1-0.15s TTFT, fastest, but tag/
#                                  tool drift is real at this size
[talker.groq]
model = "openai/gpt-oss-120b"

# Gemini 2.5 Flash: Google's mid-tier latency model, ~200-300 ms TTFB,
# strong at structured output. Reached via Gemini's openai-compatible
# endpoint at https://generativelanguage.googleapis.com/v1beta/openai/.
[talker.gemini]
model = "gemini-2.5-flash"

# Cartesia Sonic-3 streaming TTS (Story 2.3). The voice_id is operator-
# supplied — pick one from https://play.cartesia.ai/voices and paste the
# GUID below. No default ships because there's no neutral pick. The
# default_emotion applies to every request in v1; Story 3.x will override
# per-segment from the streaming SSML splitter. model = "sonic-3" is
# Cartesia's flagship low-latency voice model (~200-400 ms TTFB target).
[tts]
# Tessa voice (Cartesia). Browse https://play.cartesia.ai/voices to swap.
voice_id = "6ccbfb76-1fc6-48f7-b71d-91ac6298247b"
default_emotion = "neutral"
model = "sonic-3"
# Speech rate multiplier. 1.0 = the voice's natural rate; <1.0 slows
# down (better intelligibility for fast-talking voices like Tessa),
# >1.0 speeds up. Adjust to taste.
speed = 0.9

# Story 3.5: four-topic event publisher. `adapter = "ros2"` for
# production; `adapter = "log"` for local dev without a ROS 2 stack
# (LogEventPublisher records every publish in-memory). DDS domain id
# must match the subscriber's domain. Topic names are operator-tunable
# per the agnostic-publisher boundary.
[publisher]
adapter = "ros2"
dds_domain_id = 0
[publisher.topics]
mood = "/olaf/mood"
activity = "/olaf/activity"
speech_emotion = "/olaf/speech_emotion"
vocalization = "/olaf/vocalization"

# Story 3.6: mood module. cooldown_publishes_per_hour enforces NFR31
# (≤4 mood publishes/hour sustained); the controller drops over-rate
# set_mood calls with a WARN log. ``initial`` must be one of the
# code-level Mood Literal values (calm, happy, playful, curious,
# thoughtful, sleepy, grumpy, excited).
[mood]
cooldown_publishes_per_hour = 4
initial = "calm"

# Story 4.1 / 4.2: orchestrator daemon HTTP endpoint. The pipeline
# reads belief-state for grounded fast-path responses (Story 4.1)
# and dispatches complex turns over SSE (Story 4.2) against this
# URL. v1 ships with localhost-only; LAN-reachable URLs require
# the Story 5.3 shared-secret / mTLS hardening before they're
# accepted at startup. Trailing slash is stripped at parse time.
#
# `enabled` is a dev-mode escape hatch. When `false`, the pipeline
# skips the startup /health probe, builds no orchestrator/belief
# clients, and the Talker runs without belief-state grounding.
# Useful when the sibling orchestrator project isn't running and
# you only want to exercise the simple-turn loop. Production
# deployments leave this at `true` so missing-daemon failures
# surface at startup (CLAUDE.md rule #4 fail-fast posture).
[daemon]
url = "http://localhost:8001"
enabled = false

# Story 4.4: Talker tool registry toggles. Both default `true`. Set
# either to `false` to remove the tool from the LLM's openai-tools
# surface — the registry won't include it in `as_openai_tools_param`,
# so the LLM literally cannot emit a tool call for it.
#
# go_to_sleep: triggers FR46 deferred-sleep on natural-language
# goodbye ("goodnight olaf"). Disable to test the simple-turn loop
# without sleep interactions.
#
# set_mood: surfaces the mood-shift hook to the LLM. Disable when
# iterating on the mood enum or to keep mood transitions limited
# to startup / calibration paths.
[tools]
enable_go_to_sleep = true
enable_set_mood = true

# Story 4.5: wake greeting (static random pick by mood). The wake
# greeting fires automatically on every sleeping→waking FSM transition;
# we pick one entry uniformly at random from the bucket matching the
# current mood. Each entry IS the spoken text (not an instruction to
# an LLM) — the early "Talker.greet" design was dropped 2026-05-07
# after Story 3.7's clarification flow showed that small LLMs treat
# instruction-style prompts as questions and answer them literally.
#
# Lists below are starter sets — operators are encouraged to expand
# to 30-40 entries per mood for low repetition over long sessions.
# Each entry should be 2-8 words, no SSML, no question-mark-ending
# instructions. The mood TINTS the register (calm = quiet acknowledge,
# playful = energetic), it doesn't dictate content (don't make every
# "happy" greeting include the word "happy").
#
# Every Mood Literal value must have at least one entry — a missing
# mood raises a clean ConfigError at startup. The Mood enum is:
# calm, happy, playful, curious, thoughtful, sleepy, grumpy, excited.
[greeting.greetings_by_mood]
calm = [
    "hey", "yeah?", "yes?", "what's up?", "I'm here", "hi",
    "yeah, hi", "what's up", "hello", "hi there",
]
happy = [
    "hey there!", "hi!", "what's up!", "good to see you",
    "hey hey", "yes!", "hiya", "hi there!",
]
playful = [
    "yo", "what's up", "heya", "sup", "hey hey", "yo what's up",
    "yes? yes?", "hm hm hm hi", "hello hello",
]
curious = [
    "yeah?", "tell me", "what's up?", "what's on your mind",
    "hi, what is it", "yes?", "yeah, hi", "go on",
]
thoughtful = [
    "hmm yes?", "yeah", "mm", "yes", "go on", "I'm listening",
    "yeah, hi", "tell me",
]
sleepy = [
    "mmh", "yeah?", "hi", "hmm what?", "mm yes?", "yeah hi",
    "I'm here", "mmh yeah",
]
grumpy = [
    "yeah", "what?", "uh", "yeah hi", "what is it",
    "yes", "hm", "go on",
]
excited = [
    "hey!", "yes!", "what's up!!", "heyy", "hi hi!", "yo!",
    "yeah hi!", "hello!", "yes yes!",
]

# Story 4.7: TurnRouter slow-path escalation. Patterns are case-
# insensitive regex strings; if any matches the transcript, the turn
# routes to the orchestrator daemon instead of Talker. Tune per the
# operator's belief-state surface and orchestrator capabilities.
# `default` is the fallback when no pattern matches; v1 ships "talker".
#
# Empty list = no escalation; every high-confidence turn goes to
# Talker (the simple-turn behavior). Add patterns when the orchestrator
# is up and you want time/calendar/weather queries handled there.
[router]
slow_path_patterns = []
default = "talker"

# 2026-05-09: hardcoded goodbye phrases. When the LLM dispatches the
# `go_to_sleep` tool, the bot first plays its LLM-generated reply,
# then plays one of these as a predictable signoff. Same static-random
# pattern as greetings — picked uniformly at random per call. Tone:
# casual, friendly, Ooppi's voice. Each phrase is the actual spoken
# text. Must be non-empty.
[goodbye]
phrases = [
    "goodnight",
    "sleep well",
    "bye for now",
    "see you later",
    "catch you next time",
    "goodnight, sweet dreams",
    "talk soon",
    "bye bye",
    "see you in a bit",
    "until next time",
    "rest well",
    "later",
    "ciao for now",
    "see ya",
    "goodnight then",
    "see you when I see you",
    "be well",
    "alright, bye",
    "going quiet now",
    "talk soon, friend",
    "bye, sleep tight",
    "have a good one",
    "alright, see you",
    "off I go",
    "okay, off to rest",
]

# Sections populated by subsequent stories:
# [lifecycle]      -- Story 4.4 (idle_to_sleeping_seconds)
# [daemon]         -- extended in Story 5.3 (bearer_token_env, mtls)
# [barge_in]       -- Story 5.1 (sustained_ms, energy_threshold)
# [logging]        -- Story 5.3 (max_file_size_mb, retention_days, console_mirror)
