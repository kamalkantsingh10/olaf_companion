schema_version = 1

# Mic input + speaker output devices — regexes matched (case-insensitive)
# against PyAudio's enumerated device names. Tune to your hardware; if a
# regex doesn't match, the pipeline refuses to start and lists the
# available device names. Use `just list-devices` to see candidates and
# `just play-test-tone` to verify the speaker side end-to-end.
[audio]
# Match PipeWire's virtual input/output — PipeWire bridges to whichever
# physical device is set as the OS-level default (System Settings ->
# Sound -> Input/Output). Going through PipeWire gets us automatic
# resampling from the device's native rate (typically 44.1 kHz or
# 48 kHz) down to the 16 kHz the pipeline pins (Whisper / Porcupine /
# Cartesia all agree on this format end-to-end). Direct ALSA pinning
# (e.g. "BY Y02") fails for devices whose native rate isn't 16 kHz
# because PyAudio doesn't resample.
input_device_name = "^pipewire$"
# Output via PipeWire too — gives us the same 16 kHz <-> device-native
# rate resampling on the playback side. Direct ALSA pinning to the BY Y02
# fails with paInvalidSampleRate (PortAudio doesn't auto-resample on
# output any more than on input), so on this PC we stay on the PipeWire
# alias even though it follows whatever the OS default sink is set to.
# Bluetooth-resistance is deferred (Story 5.4 territory).
#
# v2 (Pi) note: on the Pi the BY Y02 conference unit will be the only
# audio device, so a direct-device regex like `^BY Y02` should work out
# of the box and is preferred for stable production routing. Re-test
# `just play-test-tone` during the v2 port; if it plays cleanly with
# the direct regex, ship that — no PipeWire dance needed on the Pi.
output_device_name = "^pipewire$"

# Picovoice Porcupine wake-word (Story 1.6). The .ppn file is trained at
# https://console.picovoice.ai/ for "Hey OLAF" and committed under
# models/wakeword/. Sensitivity 0.5 is conservative — Story 5.5 tunes.
[wakeword]
model_path = "models/wakeword/hey_olaf.ppn"
# Sensitivity 0.85 (above the architecture's conservative-default 0.5)
# because 0.5 produced false-negatives during Story 1.6's live test on the
# BY Y02 USB conference mic. Story 5.5 will calibrate the production value
# from a real ambient soak; 0.85 just lets us close 1.6's "mechanism works
# end-to-end" AC. If you swap in a different mic and see false-positives,
# drop this back toward 0.5.
sensitivity = 0.85

# Voice activity detection (Story 1.7). silence_duration_ms is how long we
# wait in continuous silence after the user stops speaking before we cut
# the utterance and run STT. Increase if folks pause a lot between words;
# decrease if you want faster turn-around.
[vad]
silence_duration_ms = 700
min_speech_duration_ms = 250
start_threshold = 0.5
end_threshold = 0.35

# Speech-to-text (Story 1.7). On first run faster-whisper downloads the
# model from HuggingFace (~500 MB for "small") to ~/.cache/huggingface/.
# Subsequent runs load from cache. Set device="cuda" if you have a GPU
# and torch installed; "auto" probes torch.cuda.is_available() at startup.
[stt]
backend = "whisper-cpu"
model = "small"
compute_type = "int8"
device = "auto"
low_confidence_threshold = 0.5

# Sections populated by subsequent stories:
# [talker]         -- Story 2.2 (model, max_tokens, system_prompt_path) + Story 4.1 (grounded_keys)
# [tts]            -- Story 2.3 (voice_id, default_emotion, model)
# [publisher]      -- Story 3.4 (transport, dds_domain_id, expression_channel, lifecycle_channel)
# [lifecycle]      -- Story 4.4 (idle_to_sleeping_seconds)
# [router]         -- Story 4.3 (slow_path_patterns, default)
# [daemon]         -- Story 4.1/4.2 (url) + Story 5.3 (bearer_token_env, mtls)
# [barge_in]       -- Story 5.1 (sustained_ms, energy_threshold)
# [logging]        -- Story 5.3 (max_file_size_mb, retention_days, console_mirror)
