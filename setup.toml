schema_version = 1

# Mic input device — regex matched (case-insensitive) against PyAudio's
# enumerated device names. Tune to your actual mic; Story 1.5's resolver
# will print the available device names if no match is found.
[audio]
# Match PipeWire's virtual input — routes to whatever device PipeWire is
# currently bridging (so an analog/jack mic, USB mic, or Bluetooth headset
# all "just work" without changing this regex). Switch to a more specific
# regex (e.g. `ALCS1200A.*Analog` or `USB.*Mic`) if you want to bypass
# PipeWire and pin a specific hardware device.
input_device_name = "^pipewire$"
# output_device_name = "..."  # Story 2.1 wires speaker output

