# Cartesia tag → speech_emotion taxonomy.
#
# Authored in Story 3.1; reshaped in
# sprint-change-proposal-2026-05-10 (boundary repair, schema 2 → 3).
# Schema validated by
# `voice_agent_pipeline.config.expression_map.load_from_path`.
#
# This map is a **vocabulary**, not renderer hints. Pre-repair the file
# carried per-emotion `expression_data:` blocks (pose / LED / eye state)
# that the loader stamped onto every published `SpeechEmotionEvent` and
# shipped on the wire — OLAF embodiment vocabulary leaking into the
# consumer-agnostic publisher boundary. Those blocks are gone. The
# embodiment project owns its own renderer mapping keyed on the
# canonical emotion name (e.g. `excited` → its choice of pose / LED /
# servo / haptic).
#
# Two ways to add a new emotion:
#
#   1. Promote to first-class: append the canonical name to the
#      `emotions:` list. The resolver returns it directly on a
#      verbatim-tag match. Use this when the emotion deserves its own
#      consumer-side rendering.
#
#   2. Fall back to an existing primary: add the new Cartesia tag to
#      the `members:` list of an existing entry under
#      `fallback_families:`. The resolver returns the family's
#      `maps_to` payload (the canonical first-class name). Use this
#      when the new tag is "another flavor of excited" or "another
#      flavor of sad" and the consumer's existing rendering is fine.
#
# Snapshot of Cartesia's emotion-modifier catalog: see
# https://docs.cartesia.ai/build-with-cartesia/capabilities/voice-control
# (and `cartesia.types.GenerationConfigParam` for the SDK's enum).
# Story 5.5 calibration owns reconciling this map with Cartesia's
# evolving catalog.

schema_version: 3

# ---------------------------------------------------------------------------
# emotions — first-class canonical names (6 primary + 6 secondary)
# ---------------------------------------------------------------------------
#
# The order in this list has no semantic meaning — the loader does set
# membership against PRIMARY_EMOTIONS + SECONDARY_EMOTIONS, not order.
# Kept in primary-then-secondary order for human readability.
emotions:
  # Primary (6)
  - neutral
  - content
  - excited
  - sad
  - angry
  - scared
  # Secondary (6)
  - happy
  - curious
  - sympathetic
  - surprised
  - frustrated
  - melancholic

# ---------------------------------------------------------------------------
# vocalizations — Cartesia inline burst tags + gesture cues
# ---------------------------------------------------------------------------
#
# Two flavors live here, distinguished by `tts_supported`:
#
#   `tts_supported: true`  — keep the literal `[tag]` in the text sent
#                            to Cartesia (rendered as audio).
#   `tts_supported: false` — strip the literal `[tag]` from the TTS
#                            text but still publish the vocalization
#                            event for embodiment.
#
# Audio bursts (laughter / sigh / gasp / clears_throat): non-verbal
# sounds Cartesia may render. v1 best-effort: laughter is documented
# as Cartesia-rendered; the other three are conservatively marked
# `false` until empirically verified on the dev host. Story 5.5
# calibration sprint (or a follow-up YAML edit) flips them once
# measured. Subscribers see the event regardless — only the audio
# rendering is gated.
#
# Gesture cues (nod / shake): pure embodiment hooks. Always
# `tts_supported: false` — they are visual gestures, not sounds; the
# string "nod" or "shake" must never reach Cartesia. The Talker prompt
# (`prompts/talker_system.md`) teaches the LLM when to emit them; the
# embodiment project binds them to head-nod / head-shake actions.
vocalizations:
  laughter: { tts_supported: true }
  sigh: { tts_supported: false }
  gasp: { tts_supported: false }
  clears_throat: { tts_supported: false }
  nod: { tts_supported: false }
  shake: { tts_supported: false }

# ---------------------------------------------------------------------------
# fallback_families — 7 axes covering Cartesia's broader catalog
# ---------------------------------------------------------------------------
#
# Every Cartesia tag NOT first-class above lives in exactly one family
# (or — last resort — falls through to `unknown` below). Adding a tag
# here is the YAML-only "extension story" the architecture promises.
#
# The 7 families come from a 2x2 valence × arousal split for the four
# primary axes (high/low energy × positive/negative) plus three named
# axes for the modes that don't cleanly fit the matrix:
# `curious_inquisitive` (cognitive engagement), `sympathetic_caring`
# (other-directed warmth), `surprise_alarm` (sudden-onset).
#
# Member lists sourced from Cartesia's Sonic-3 emotion-modifier docs;
# see file-level comment for the URL. Tags listed here that Cartesia
# later removes still resolve cleanly — the resolver returns the
# family's `maps_to` regardless.
fallback_families:

  high_energy_positive:
    members: [enthusiastic, gleeful, joyful, elated, eager, ecstatic, exuberant, thrilled]
    maps_to: excited

  low_energy_positive:
    members: [relaxed, serene, peaceful, satisfied, calm, hopeful, grateful, fond]
    maps_to: content

  high_energy_negative:
    members: [furious, irritated, annoyed, aggressive, indignant, enraged, hostile, exasperated]
    maps_to: angry

  low_energy_negative:
    members: [melancholy, disappointed, gloomy, regretful, tearful, despondent, weary, defeated, resigned]
    maps_to: sad

  curious_inquisitive:
    members: [inquisitive, interested, intrigued, pondering, contemplative, thoughtful, attentive]
    maps_to: curious

  sympathetic_caring:
    members: [concerned, apologetic, caring, gentle, tender, compassionate, soothing, reassuring]
    maps_to: sympathetic

  surprise_alarm:
    members: [shocked, astonished, startled, alarmed, worried, fearful, anxious, dismayed, taken_aback]
    maps_to: surprised

# ---------------------------------------------------------------------------
# unknown — last-resort fallback when no family matches
# ---------------------------------------------------------------------------
#
# Any tag not first-class and not in a family resolves to `neutral`
# with `resolved_fallback="unknown"` on the wire — and the resolver
# emits a WARN log every occurrence (FR38). A run that produces these
# warnings is a signal to extend a family above.
unknown:
  maps_to: neutral

# 7 fallback families covering ~57 Cartesia tags + 12 first-class
# canonical names + 6 vocalizations (4 audio bursts + 2 gesture cues)
# + 1 unknown sentinel.
